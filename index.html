<!DOCTYPE html>
<html>
<head>
<title>Guild Glory System</title>

<style>
body{
  background:#07121f;
  color:white;
  font-family:Arial;
  text-align:center;
}

h1{
  color:#00e0ff;
  margin-top:30px;
}

.card{
  background:#0b1f33;
  padding:20px;
  margin:20px;
  border-radius:15px;
  box-shadow:0 0 20px #00e0ff33;
}

button{
  padding:10px 20px;
  border:none;
  border-radius:8px;
  margin:10px;
  font-size:16px;
  cursor:pointer;
  background:linear-gradient(to right,#00e0ff,#0077ff);
  color:white;
}

button:hover{
  box-shadow:0 0 20px #00e0ff;
  transform:scale(1.05);
  transition:0.3s;
}

input{
  padding:10px;
  width:80%;
  border-radius:8px;
  border:none;
  margin-top:10px;
}
</style>
</head>

<body>

<h1>⚡ GUILD GLORY SYSTEM</h1>

<div class="card">
<h2>Live Players: <span id="counter">1185</span></h2>
<h3>Server: <span id="serverStatus" style="color:lime;">ONLINE</span></h3>
</div>

<div class="card">
<h2>Select Plan</h2>
<button>₹99 Starter</button>
<button>₹149 Pro</button>
<button>₹299 Ultra</button>
</div>

<div class="card">
<h2>Connect Guild</h2>
<input type="text" placeholder="Enter UID">
<br>
<button onclick="connectGuild()">CONNECT GUILD</button>
</div>

<div class="card">
<h2>Why Choose Us?</h2>
<p>⚡ Instant Guild Sync</p>
<p>🛡 AI Protection</p>
<p>🔥 Fast Boost Speed</p>
<p>📡 Real Time Monitoring</p>
</div>

<footer>
<p>© 2026 Guild Glory System</p>
</footer>

<script>
let count = 1185;

setInterval(function(){
  count += Math.floor(Math.random()*3);
  document.getElementById("counter").innerText = count;
},3000);

setInterval(function(){
  let s = document.getElementById("serverStatus");
  s.style.color = (s.style.color === "lime") ? "white" : "lime";
},800);

function connectGuild(){
  alert("Guild Sync Started...");
}
</script>

</body>
</html>
