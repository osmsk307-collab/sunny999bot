<!DOCTYPE html>
<html lang="hi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>SUNNY 999 BOT - Guild Glory System</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <style>
        :root { --bg: #050a1a; --card: #0b1426; --neon: #00f2ff; --purple: #7000ff; --green: #00ff88; }
        body { background: var(--bg); color: white; font-family: sans-serif; margin: 0; padding: 20px; display: flex; justify-content: center; }
        .app-container { width: 100%; max-width: 400px; }
        
        /* Header: YT Logo + Name */
        .header { display: flex; justify-content: space-between; align-items: center; margin-bottom: 20px; }
        .yt-icon { color: #ff0000; font-size: 26px; }
        .brand { font-weight: bold; font-size: 20px; letter-spacing: 1px; }

        /* Server Status */
        .status-bar { background: var(--card); padding: 12px; border-radius: 8px; display: flex; justify-content: space-between; font-size: 13px; margin-bottom: 25px; border: 1px solid #1a2a44; }
        .status-online { color: var(--green); font-weight: bold; }

        .main-title { text-align: center; font-size: 24px; font-weight: 900; background: linear-gradient(to right, var(--neon), var(--purple)); -webkit-background-clip: text; -webkit-text-fill-color: transparent; margin-bottom: 10px; text-transform: uppercase; }

        input, select { width: 100%; padding: 14px; margin: 12px 0; background: #0d1b35; border: 1px solid #1e3a5f; color: white; border-radius: 8px; box-sizing: border-box; font-size: 15px; }
        .btn { width: 100%; padding: 16px; border: none; border-radius: 10px; font-weight: bold; cursor: pointer; color: white; font-size: 16px; transition: 0.3s; }
        .btn-blue { background: linear-gradient(to right, #008cff, #0051ff); box-shadow: 0 0 20px rgba(0, 140, 255, 0.4); }

        /* Plan Cards */
        .plan { background: var(--card); border: 2px solid var(--neon); border-radius: 15px; padding: 18px; margin-bottom: 15px; text-align: center; cursor: pointer; }
        .price { font-size: 26px; color: var(--neon); font-weight: bold; margin: 5px 0; }
        .glory { color: #ffd700; font-weight: bold; font-size: 14px; }

        /* Payment Section (QR Fixed) */
        .qr-section { background: var(--card); padding: 20px; border-radius: 20px; border: 2px solid var(--neon); text-align: center; }
        .qr-display { width: 230px; height: 230px; background: white; margin: 15px auto; padding: 10px; border-radius: 12px; border: 3px solid var(--neon); display: flex; align-items: center; justify-content: center; }
        .qr-display img { width: 100%; height: 100%; object-fit: contain; }

        .hidden { display: none; }
        .page { animation: fadeIn 0.4s ease-in-out; }
        @keyframes fadeIn { from { opacity: 0; transform: translateY(10px); } to { opacity: 1; transform: translateY(0); } }
    </style>
</head>
<body>

<div class="app-container">
    <div class="header">
        <i class="fab fa-youtube yt-icon"></i>
        <div class="brand">SUNNY 999 BOT</div>
    </div>

    <div class="status-bar">
        <span>Server: <span class="status-online">ONLINE</span></span>
        <span>Players: 1185</span>
    </div>

    <div id="p1" class="page">
        <div class="main-title">GUILD GLORY SYSTEM</div>
        <p style="text-align: center; color: var(--neon); font-size: 13px; margin-top: -5px;">Live Players: 1291</p>
        <label>Guild UID</label>
        <input type="number" id="uidInput" placeholder="Enter UID (Numbers Only)">
        <label>Select Country</label>
        <select>
            <option>India</option>
            <option>Bangladesh</option>
            <option>Nepal</option>
        </select>
        <button class="btn btn-blue" onclick="nav('p1','p2')">🔴 CONNECT GUILD</button>
    </div>

    <div id="p2" class="page hidden">
        <div class="main-title">SELECT BOOST PLAN</div>
        <div class="plan" onclick="pay(99)">
            <div>Starter Boost</div>
            <div class="price">₹99</div>
            <div class="glory">+60K GLORY</div>
        </div>
        <div class="plan" onclick="pay(149)" style="border-color: var(--purple);">
            <div>Pro Boost</div>
            <div class="price">₹149</div>
            <div class="glory">+150K GLORY</div>
        </div>
        <div class="plan" onclick="pay(299)" style="border-color: var(--green);">
            <div>Ultra Boost</div>
            <div class="price">₹299</div>
            <div class="glory">+450K GLORY</div>
        </div>
    </div>

    <div id="p3" class="page hidden">
        <div class="main-title" style="font-size: 18px;">Scan & Complete Payment</div>
        <div class="qr-section">
            <p id="amtDisplay" style="color: var(--neon); font-weight: bold; font-size: 18px;">Plan: ₹99</p>
            <div class="qr-display">
                <img src="your_qr_code.png" alt="Payment QR Code">
            </div>
            <p style="font-size: 13px; margin: 10px 0;">Enter Transaction UTR</p>
            <input type="number" id="utrVal" placeholder="Enter 12 Digit UTR">
            <button class="btn" style="background: var(--neon); color: black;" onclick="finish()">Verify UTR ✅</button>
        </div>
    </div>
</div>

<script>
    function nav(oldID, newID) {
        if(oldID === 'p1' && document.getElementById('uidInput').value.length < 5) {
            alert("Kripya sahi Guild UID daalein!"); return;
        }
        document.getElementById(oldID).classList.add('hidden');
        document.getElementById(newID).classList.remove('hidden');
    }
    function pay(amount) {
        document.getElementById('amtDisplay').innerText = "Selected Plan: ₹" + amount;
        nav('p2', 'p3');
    }
    function finish() {
        let utr = document.getElementById('utrVal').value;
        if(utr.length === 12) {
            alert("Verification Started! 30-60 mins mein boost ho jayega.");
            location.reload();
        } else {
            alert("12 digit ka valid UTR number daalein!");
        }
    }
</script>

</body>
</html>
