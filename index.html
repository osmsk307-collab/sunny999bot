<!DOCTYPE html>
<html>
<head>
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Guild Glory System</title>

<style>
body{
  margin:0;
  font-family:Arial, sans-serif;
  background:#031524;
  color:white;
  text-align:center;
}

/* Title */
h1{
  margin-top:40px;
  font-size:30px;
  color:#00e6ff;
}

.subtitle{
  color:#00c3ff;
  margin-bottom:30px;
  font-size:16px;
}

/* Boost Cards */
.boost-card{
  margin:20px;
  padding:30px 20px;
  border-radius:25px;
  background:#071f33;
  box-shadow:0 0 25px rgba(0,255,255,0.6);
  transition:0.3s;
}

.boost-card:hover{
  transform:scale(1.03);
  box-shadow:0 0 40px rgba(0,255,255,0.9);
}

.price{
  font-size:34px;
  color:#00f2ff;
  margin:10px 0;
  font-weight:bold;
}

.glory{
  color:gold;
  font-size:18px;
}

/* Payment Button */
.pay-btn{
  margin:30px 20px;
  padding:18px;
  border-radius:40px;
  border:none;
  width:85%;
  max-width:400px;
  font-size:18px;
  font-weight:bold;
  cursor:pointer;
  background:linear-gradient(90deg,#00f2ff,#0077ff);
  color:white;
  box-shadow:0 0 30px rgba(0,255,255,0.8);
}

/* Rating Box */
.rating-box{
  margin:20px;
  padding:20px;
  border-radius:20px;
  background:#071f33;
  box-shadow:0 0 25px rgba(0,255,255,0.4);
  text-align:left;
}

.rating-box h3{
  color:#00e6ff;
  text-align:center;
}

footer{
  margin:30px 0;
  font-size:13px;
  opacity:0.7;
}
</style>
</head>

<body>

<h1>⚡ GUILD GLORY SYSTEM</h1>
<p class="subtitle">Select Your Glory Boost Plan</p>

<div class="boost-card">
  <h2>🥇 Starter Boost</h2>
  <div class="price">₹99</div>
  <div class="glory">+60K GLORY</div>
</div>

<div class="boost-card">
  <h2>🥈 Pro Boost</h2>
  <div class="price">₹149</div>
  <div class="glory">+150K GLORY</div>
</div>

<div class="boost-card">
  <h2>🥉 Ultra Boost</h2>
  <div class="price">₹299</div>
  <div class="glory">+450K GLORY</div>
</div>

<button class="pay-btn">💳 Proceed To Payment</button>

<div class="rating-box">
  <h3>⭐ Player Ratings</h3>
  <p>🔥 System Performance — ⭐⭐⭐⭐⭐</p>
  <p>⚡ Boost Speed — ⭐⭐⭐⭐⭐</p>
  <p>🛡 Security — ⭐⭐⭐⭐⭐</p>
</div>

<footer>
© 2026 sunny 999 bot
</footer>

</body>
</html>
