<!DOCTYPE html>
<html>
<head>
<title>Guild Glory System</title>
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<style>
body{
  margin:0;
  background:linear-gradient(135deg,#07121f,#0f3057);
  color:white;
  font-family:Arial;
  text-align:center;
}

#loading{
  position:fixed;
  width:100%;
  height:100%;
  background:#07121f;
  display:flex;
  justify-content:center;
  align-items:center;
  font-size:20px;
  z-index:9999;
}

h1{
  margin-top:40px;
  color:#00e0ff;
}

.brand{
  color:red;
  font-size:18px;
  text-shadow:0 0 10px red;
}

.card{
  background:rgba(255,255,255,0.05);
  backdrop-filter:blur(10px);
  padding:20px;
  margin:20px;
  border-radius:20px;
  box-shadow:0 0 20px rgba(0,224,255,0.3);
}

button{
  padding:12px;
  width:80%;
  max-width:250px;
  border:none;
  border-radius:10px;
  margin:10px;
  font-size:16px;
  cursor:pointer;
  background:linear-gradient(to right,#00e0ff,#0077ff);
  color:white;
}

button:hover{
  box-shadow:0 0 25px #00e0ff;
  transform:scale(1.05);
  transition:0.3s;
}

input{
  padding:12px;
  width:80%;
  max-width:300px;
  border-radius:10px;
  border:none;
}

footer{
  margin-top:30px;
  padding:20px;
  font-size:14px;
  opacity:0.7;
}
</style>
</head>

<body>

<div id="loading">
⚡ Loading Guild System...
</div>

<h1>
⚡ GUILD GLORY SYSTEM <br>
<span class="brand">sunny 999 bot</span>
</h1>

<a href="https://youtube.com" target="_blank">
<img src="https://upload.wikimedia.org/wikipedia/commons/9/9f/Youtube%28amin%29.png" width="45">
</a>

<div class="card">
<h2>Live Players: <span id="counter">1185</span></h2>
<h3>Server: <span id="serverStatus" style="color:lime;">ONLINE</span></h3>
</div>

<div class="card">
<h2>Select Plan</h2>
<button>₹99 Starter</button>
<button>₹149 Pro</button>
<button>₹299 Ultra</button>
</div>

<div class="card">
<h2>Connect Guild</h2>
<input type="text" id="uid" placeholder="Enter UID">
<br>
<button onclick="connectGuild()">CONNECT GUILD</button>
<p id="status"></p>
</div>

<div class="card">
<h2>Why Choose Us?</h2>
<p>⚡ Instant Guild Sync</p>
<p>🛡 AI Protection</p>
<p>🔥 Fast Boost Speed</p>
<p>📊 Real-Time Monitoring</p>
</div>

<footer>
© 2026 sunny 999 bot | All Rights Reserved
</footer>

<script>
let count = 1185;

setInterval(function(){
  count += Math.floor(Math.random()*3);
  document.getElementById("counter").innerText = count;
},3000);

setInterval(function(){
  let s = document.getElementById("serverStatus");
  s.style.color = (s.style.color==="lime")?"white":"lime";
},800);

function connectGuild(){
  let uid = document.getElementById("uid").value;
  let status = document.getElementById("status");

  if(uid===""){
    status.innerText="⚠ Enter UID first";
    status.style.color="orange";
  } else {
    status.innerText="⏳ Connecting...";
    status.style.color="yellow";
    setTimeout(function(){
      status.innerText="✅ Guild Request Sent Successfully!";
      status.style.color="lime";
    },2000);
  }
}

window.onload=function(){
  setTimeout(function(){
    document.getElementById("loading").style.display="none";
  },1500);
}
</script>

</body>
</html>
