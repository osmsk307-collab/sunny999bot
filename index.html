<!DOCTYPE html>
<html lang="hi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Guild Glory - Payment System</title>
    <style>
        :root {
            --bg: #050a1a;
            --card: #0b1426;
            --neon: #00f2ff;
            --btn: #008cff;
        }

        body {
            background-color: var(--bg);
            color: white;
            font-family: sans-serif;
            display: flex;
            flex-direction: column;
            align-items: center;
            padding: 20px;
        }

        .container { width: 100%; max-width: 400px; text-align: center; }

        /* Notification Ticker */
        .ticker {
            background: rgba(0, 242, 255, 0.1);
            color: var(--neon);
            padding: 8px;
            font-size: 12px;
            border-radius: 5px;
            margin-bottom: 20px;
            width: 100%;
        }

        /* QR Box */
        .qr-card {
            background: var(--card);
            padding: 20px;
            border-radius: 15px;
            border: 1px solid #1e3a5f;
            margin-top: 20px;
        }

        .qr-image {
            width: 200px;
            height: 200px;
            background: white;
            margin: 15px auto;
            display: flex;
            align-items: center;
            justify-content: center;
            border-radius: 10px;
        }

        .qr-image img { width: 90%; }

        /* Input Styles */
        input {
            width: 90%;
            padding: 12px;
            margin: 15px 0;
            background: #0d1b35;
            border: 1px solid #1e3a5f;
            color: white;
            border-radius: 8px;
            text-align: center;
        }

        .btn-verify {
            background: #00f2ff;
            color: #000;
            border: none;
            padding: 12px 30px;
            font-weight: bold;
            border-radius: 5px;
            cursor: pointer;
            width: 100%;
        }

        .hidden { display: none; }
        
        .success-msg { color: #00ff88; font-weight: bold; margin-top: 10px; }
    </style>
</head>
<body>

<div class="container">
    <h2 style="color: var(--neon);">⚡ GUILD GLORY SYSTEM</h2>
    
    <div class="ticker" id="ticker">
        DragonYT purchased ₹299 Plan • Legend purchased ₹149 Plan
    </div>

    <div id="step1">
        <p>Select Your Plan</p>
        <button class="btn-verify" onclick="showPayment(99)">₹99</button>
        <button class="btn-verify" onclick="showPayment(149)" style="margin-top:10px;">₹149</button>
        <button class="btn-verify" onclick="showPayment(299)" style="margin-top:10px;">₹299</button>
    </div>

    <div id="step2" class="qr-card hidden">
        <h3>Scan & Complete Payment</h3>
        <p id="selected-plan">Amount: ₹0</p>
        
        <div class="qr-image">
            <img src="https://api.qrserver.com/v1/create-qr-code/?size=200x200&data=upi://pay?pa=YOURUPI@okicici&am=99" alt="QR Code">
        </div>

        <p style="font-size: 12px; color: #aaa;">Enter 12 Digit UTR / Transaction ID after payment</p>
        
        <input type="number" id="utr-input" placeholder="Enter Payment UTR">
        
        <button class="btn-verify" onclick="verifyUTR()">Verify UTR ✅</button>
        
        <div id="msg"></div>
    </div>
</div>

<script>
    // Live Ticker Logic
    const names = ["SniperX", "Killer_Boy", "RaiStar", "Badge99", "TotalGaming"];
    setInterval(() => {
        let name = names[Math.floor(Math.random() * names.length)];
        let amt = [99, 149, 299][Math.floor(Math.random() * 3)];
        document.getElementById('ticker').innerText = `${name} purchased Glory Boost ₹${amt} • Processing...`;
    }, 4000);

    function showPayment(amount) {
        document.getElementById('step1').classList.add('hidden');
        document.getElementById('step2').classList.remove('hidden');
        document.getElementById('selected-plan').innerText = "Amount to Pay: ₹" + amount;
    }

    function verifyUTR() {
        let utr = document.getElementById('utr-input').value;
        let msg = document.getElementById('msg');
        
        if(utr.length === 12) {
            msg.innerHTML = "<p class='success-msg'>Verifying Transaction...</p>";
            setTimeout(() => {
                msg.innerHTML = "<p class='success-msg'>✅ Payment Success! Your Glory Boost will start in 10 minutes.</p>";
            }, 3000);
        } else {
            alert("Please enter a valid 12-digit UTR Number!");
        }
    }
</script>

</body>
</html>
