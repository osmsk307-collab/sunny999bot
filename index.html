<!DOCTYPE html>
<html>
<head>
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Guild Glory System</title>

<style>
body{
  margin:0;
  font-family:Arial, sans-serif;
  background:#031524;
  color:white;
  text-align:center;
}

h1{
  margin-top:40px;
  font-size:30px;
  color:#00e6ff;
}

.subtitle{
  color:#00c3ff;
  margin-bottom:30px;
  font-size:16px;
}

.boost-card{
  margin:20px;
  padding:30px 20px;
  border-radius:25px;
  background:#071f33;
  box-shadow:0 0 25px rgba(0,255,255,0.6);
  transition:0.3s;
}

.boost-card:hover{
  transform:scale(1.03);
  box-shadow:0 0 40px rgba(0,255,255,0.9);
}

.price{
  font-size:34px;
  color:#00f2ff;
  margin:10px 0;
  font-weight:bold;
}

.glory{
  color:gold;
  font-size:18px;
}

.pay-section{
  margin:20px;
  padding:25px;
  border-radius:20px;
  background:#071f33;
  box-shadow:0 0 25px rgba(0,255,255,0.4);
}

input, select{
  padding:10px;
  margin:8px;
  border-radius:10px;
  border:none;
  width:80%;
  max-width:320px;
}

button{
  padding:12px 20px;
  border-radius:25px;
  border:none;
  margin-top:10px;
  font-weight:bold;
  cursor:pointer;
  background:linear-gradient(90deg,#00f2ff,#0077ff);
  color:white;
}

.output-box{
  margin:20px;
  padding:20px;
  border-radius:15px;
  background:#02101a;
  text-align:left;
  white-space:pre-wrap;
  box-shadow:0 0 20px rgba(0,255,255,0.4);
}

footer{
  margin:30px 0;
  font-size:13px;
  opacity:0.7;
}
</style>
</head>

<body>

<h1>⚡ GUILD GLORY SYSTEM</h1>
<p class="subtitle">Select Your Glory Boost Plan</p>

<div class="boost-card">
  <h2>🥇 Starter Boost</h2>
  <div class="price">₹99</div>
  <div class="glory">+60K GLORY</div>
</div>

<div class="boost-card">
  <h2>🥈 Pro Boost</h2>
  <div class="price">₹149</div>
  <div class="glory">+150K GLORY</div>
</div>

<div class="boost-card">
  <h2>🥉 Ultra Boost</h2>
  <div class="price">₹299</div>
  <div class="glory">+450K GLORY</div>
</div>

<div class="pay-section">
<h2>🔥 Submit Payment Details</h2>

<input type="text" id="uid" placeholder="Enter UID"><br>

<select id="country">
  <option value="🇮🇳 India">🇮🇳 India</option>
  <option value="🇧🇩 Bangladesh">🇧🇩 Bangladesh</option>
  <option value="🇵🇰 Pakistan">🇵🇰 Pakistan</option>
</select><br>

<select id="plan">
  <option value="Ultra Boost|299|450K Glory">Ultra Boost - ₹299</option>
  <option value="Pro Boost|149|150K Glory">Pro Boost - ₹149</option>
  <option value="Starter Boost|99|60K Glory">Starter Boost - ₹99</option>
</select><br>

<input type="text" id="utr" placeholder="Enter UTR"><br>

<button onclick="generatePayment()">Submit Payment</button>

</div>

<div id="result" class="output-box" style="display:none;"></div>

<footer>
© 2026 sunny 999 bot
</footer>

<script>
function generatePayment(){

let uid = document.getElementById("uid").value;
let country = document.getElementById("country").value;
let planData = document.getElementById("plan").value.split("|");
let planName = planData[0];
let amount = planData[1];
let glory = planData[2];
let utr = document.getElementById("utr").value;

if(uid=="" || utr==""){
alert("Please fill all details");
return;
}

let message =
`🔥 GUILD GLORY PAYMENT

👤 UID: ${uid}
🌍 Country: ${country}

💎 Plan: ${planName}
💰 Amount: ₹${amount}
⚡ Glory: ${glory}

🧾 UTR: ${utr}

📌 Payment Submitted. Verification Pending.`;

document.getElementById("result").style.display="block";
document.getElementById("result").innerText=message;

}
</script>

</body>
</html>
