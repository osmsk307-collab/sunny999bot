
<!DOCTYPE html>
<html>
<head>
<title>Sunny 999 Bot</title>
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<style>
body{
margin:0;
padding:0;
background:black;
color:white;
font-family:Arial;
text-align:center;
overflow:hidden;
}

h1{
color:#00ff00;
font-size:40px;
margin-top:120px;
animation: glow 1.5s infinite alternate;
}

@keyframes glow{
from{ text-shadow:0 0 10px #00ff00;}
to{ text-shadow:0 0 25px #00ff00;}
}

p{
color:#00ff99;
font-size:18px;
}

button{
margin-top:20px;
padding:12px 30px;
font-size:18px;
background:#00ff00;
border:none;
border-radius:30px;
cursor:pointer;
font-weight:bold;
transition:0.3s;
}

button:hover{
background:white;
color:black;
transform:scale(1.1);
}

.bg-animation{
position:absolute;
width:100%;
height:100%;
background:radial-gradient(circle,#003300,black);
z-index:-1;
animation: move 6s infinite alternate;
}

@keyframes move{
from{filter:blur(0px);}
to{filter:blur(8px);}
}
</style>
</head>

<body>

<div class="bg-animation"></div>

<h1>SUNNY 999 BOT 👑</h1>
<p>Official Website Live 🚀</p>

<button onclick="alert('Welcome Champion 🔥')">
Join Now
</button>

</body>
</html>
